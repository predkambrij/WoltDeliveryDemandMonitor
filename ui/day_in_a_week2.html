<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Demand · Weekday Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#17201c",
              muted: "#67736d",
              paper: "#fffefa",
              field: "#f4f1ea",
              line: "#ddd6cb",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-w-[320px] bg-field text-ink">
    <main class="min-h-screen w-full px-4 py-5 sm:px-6 lg:px-8">
      <header class="mb-4 flex flex-col gap-3 lg:flex-row lg:items-end lg:justify-between">
        <div>
          <h1 class="text-xl font-black uppercase tracking-widest text-muted sm:text-2xl">Demand by Hour &amp; Weekday</h1>
          <p class="mt-1 text-sm font-bold text-muted">Heatmap shows average demand per hour · lines show each day's smoothed shape</p>
        </div>
        <a href="/" class="rounded-lg border border-line bg-paper px-4 py-2 text-sm font-black text-muted shadow-sm hover:text-ink">← Single day view</a>
      </header>

      <section class="mb-4 overflow-hidden rounded-lg border border-line bg-paper shadow-sm">
        <div class="flex items-center justify-between border-b border-line px-4 py-3">
          <strong class="text-base font-black">Average demand level by hour</strong>
          <span id="heatScale" class="flex items-center gap-2 text-xs font-black text-muted"></span>
        </div>
        <div class="overflow-x-auto px-3 py-3">
          <div id="heatmap"></div>
        </div>
      </section>

      <section class="overflow-hidden rounded-lg border border-line bg-paper shadow-sm">
        <div class="flex flex-wrap items-center gap-2 border-b border-line px-4 py-3">
          <strong class="mr-2 text-base font-black">Each day, smoothed</strong>
          <button id="selectAll" class="rounded-md border border-line px-3 py-1.5 text-xs font-black text-muted hover:text-ink">Select all</button>
          <button id="selectNone" class="rounded-md border border-line px-3 py-1.5 text-xs font-black text-muted hover:text-ink">Deselect all</button>
          <span class="mx-1 h-5 w-px bg-line"></span>
          <div id="toggles" class="flex flex-wrap gap-2"></div>
          <span class="mx-1 h-5 w-px bg-line"></span>
          <label class="flex items-center gap-2 text-xs font-black text-muted">Smoothing
            <input id="smooth" type="range" min="0" max="12" value="3" class="accent-ink">
            <span id="smoothVal" class="tabular-nums text-ink">±15m</span>
          </label>
        </div>
        <div class="px-2 py-2">
          <div id="chartWrap" class="relative">
            <div id="chart"></div>
            <div id="tip" class="pointer-events-none absolute z-10 hidden whitespace-nowrap rounded-md bg-ink/90 px-2 py-1 text-xs font-black text-white shadow-lg"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="./week2.js"></script>
  </body>
</html>
