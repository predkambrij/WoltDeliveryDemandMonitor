services:
  puppeteer:
    build:
      context: .
      network: host
      dockerfile_inline: |
        FROM node:22-bookworm-slim

        ENV NODE_ENV=production \
            PUPPETEER_SKIP_DOWNLOAD=true \
            PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium

        WORKDIR /app

        RUN apt-get update \
            && apt-get install -y --no-install-recommends \
              ca-certificates \
              chromium \
              fonts-liberation \
              fluxbox \
              libasound2 \
              libatk-bridge2.0-0 \
              libatk1.0-0 \
              libcups2 \
              libdbus-1-3 \
              libdrm2 \
              libgbm1 \
              libgtk-3-0 \
              libnspr4 \
              libnss3 \
              libx11-xcb1 \
              libxcomposite1 \
              libxdamage1 \
              libxfixes3 \
              libxkbcommon0 \
              libxrandr2 \
              novnc \
              websockify \
              x11vnc \
              xvfb \
              xdg-utils \
            && rm -rf /var/lib/apt/lists/*

        COPY package*.json ./
        RUN npm ci --omit=dev

        COPY src ./src
        COPY scripts ./scripts
        RUN chmod +x /app/scripts/start-browser.sh

        EXPOSE 5900 7900

        ENTRYPOINT ["/app/scripts/start-browser.sh"]
    environment:
      - PUPPETEER_HEADLESS=${PUPPETEER_HEADLESS:-false}
      - DEBUG_SLEEP_SEC=${DEBUG_SLEEP_SEC:-3600}
      - TARGET_URL=${TARGET_URL:-http://127.0.0.1:8083/}
      - TZ=Europe/Ljubljana
    network_mode: host
    volumes:
      - ./out:/app/out
    ports:
      - "127.0.0.1:7900:7900"
    restart: no

  update-deps:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && echo 'Done — package-lock.json updated'"
